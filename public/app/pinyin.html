<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼音乐园 - Fun Kids</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&display=swap&text=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ%C4%81%C3%A1%C7%8E%C3%A0%C5%8D%C3%B3%C7%92%C3%B2%C4%93%C3%A9%C4%9B%C3%A8%C4%AB%C3%AD%C7%90%C3%AC%C5%AB%C3%BA%C7%94%C3%B9%C7%96%C7%98%C7%9A%C7%9C%C3%BC">
  <link rel="stylesheet" href="./pinyin.css">
</head>
<body>
  <!-- 背景装饰 -->
  <div class="bg-decor c1">☁️</div>
  <div class="bg-decor c2">🌈</div>
  <div class="bg-decor s1">⭐</div>
  <div class="bg-decor s2">🌟</div>

  <!-- 登录 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2>🎵 拼音乐园</h2>
      <p>请输入密码进入乐园</p>
      <input type="password" id="loginPassword" placeholder="请输入密码" autofocus>
      <button onclick="doLogin()">进入乐园 🚀</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- 主界面 -->
  <div class="app-content" id="appContent">
    <a href="index.html" class="back-btn" title="返回"><i class="fas fa-arrow-left"></i></a>

    <!-- 结果弹窗 -->
    <div class="result-overlay" id="resultOverlay" onclick="closeResultOverlay(event)">
      <button class="close-btn" onclick="closeResult()" title="关闭"><i class="fas fa-xmark"></i></button>
      <div class="result-card" id="resultCard"></div>
    </div>

    <div class="container">
      <!-- 声母 -->
      <div class="panel">
        <div class="panel-title"><i class="fas fa-music"></i> 声母</div>
        <div class="btn-grid" id="initialGrid"></div>
      </div>

      <!-- 韵母 -->
      <div class="panel">
        <div class="panel-title"><i class="fas fa-star"></i> 韵母</div>
        <div class="btn-grid" id="finalGrid"></div>
      </div>

      <!-- 声调 -->
      <div class="panel">
        <div class="panel-title"><i class="fas fa-wand-magic-sparkles"></i> 声调</div>
        <div class="btn-grid" id="toneGrid"></div>
      </div>

      <!-- 操作按钮 -->
      <div class="action-bar">
        <button class="action-btn btn-combine" onclick="combine()">组合</button>
        <button class="action-btn btn-clear" onclick="clearAll()">清除</button>
        <button class="action-btn btn-random" onclick="randomPick()">试试手气</button>
        <div class="read-aloud-bar">
          <i class="fas fa-volume-high" style="color:#4CAF50;font-size:18px;"></i>
          <span>点读</span>
          <label class="toggle-switch">
            <input type="checkbox" id="readAloudToggle" onchange="toggleReadAloud()">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
      </div>
    </div>
  </div>

  <script src="./pinyin.js" defer></script>
</body>
</html>
