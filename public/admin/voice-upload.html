<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语音录音管理 - Fun Kids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif; background: #F5F5F5; color: #333; min-height: 100vh; }

    /* 登录 */
    .login-overlay {
      position: fixed; inset: 0; background: #F5F5F5;
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .login-overlay.hidden { display: none; }
    .login-box {
      background: white; border-radius: 12px; padding: 40px 36px;
      text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 380px; width: 90%;
    }
    .login-box h2 { font-size: 22px; margin-bottom: 24px; font-weight: 700; }
    .login-box input {
      width: 100%; padding: 12px 16px; font-size: 15px;
      border: 1px solid #DDD; border-radius: 8px; outline: none;
      font-family: inherit;
    }
    .login-box input:focus { border-color: #1976D2; }
    .login-box button {
      width: 100%; padding: 12px; margin-top: 16px; font-size: 15px; font-weight: 700;
      background: #1976D2; color: white; border: none; border-radius: 8px; cursor: pointer;
      font-family: inherit;
    }
    .login-box button:hover { background: #1565C0; }
    .login-error { color: #F44336; margin-top: 10px; font-size: 13px; min-height: 18px; }

    /* 主界面 */
    .app { display: none; }
    .app.visible { display: block; }
    .topbar {
      position: sticky; top: 0; background: white; border-bottom: 1px solid #E0E0E0;
      padding: 12px 24px; display: flex; align-items: center; gap: 16px; z-index: 10;
    }
    .topbar h1 { font-size: 18px; font-weight: 700; }
    .topbar .stats { margin-left: auto; font-size: 13px; color: #777; }
    .topbar a {
      font-size: 13px; color: #1976D2; text-decoration: none; padding: 6px 12px;
      border: 1px solid #BBDEFB; border-radius: 6px;
    }
    .topbar a:hover { background: #E3F2FD; }

    .container { max-width: 1000px; margin: 0 auto; padding: 24px; }

    h2 {
      font-size: 16px; color: #555; margin: 24px 0 12px;
      border-bottom: 2px solid #E0E0E0; padding-bottom: 8px;
    }
    h2 .count { font-weight: 400; color: #999; }

    /* 声母网格 */
    .initial-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .voice-card {
      background: white; border: 2px solid #E0E0E0; border-radius: 10px;
      padding: 10px; text-align: center; transition: all 0.15s;
    }
    .voice-card.uploaded { border-color: #66BB6A; }
    .voice-card .label { font-size: 18px; font-weight: 700; color: #1565C0; }
    .voice-card .status {
      font-size: 11px; margin: 4px 0 8px;
      color: #999;
    }
    .voice-card.uploaded .status { color: #2E7D32; }
    .voice-card .actions { display: flex; gap: 4px; justify-content: center; }
    .btn-sm {
      padding: 4px 10px; font-size: 12px; border: 1px solid #ddd; border-radius: 6px;
      background: #fafafa; cursor: pointer; font-family: inherit; transition: all 0.1s;
    }
    .btn-sm:hover { background: #E3F2FD; border-color: #90CAF9; }
    .btn-play { color: #1976D2; }
    .btn-play:disabled { color: #ccc; cursor: default; }
    .btn-play:disabled:hover { background: #fafafa; border-color: #ddd; }
    .btn-upload { color: #2E7D32; }
    .btn-del { color: #F44336; border-color: #FFCDD2; }
    .btn-del:hover { background: #FFF5F5; }

    /* 韵母网格 */
    .final-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .final-card {
      background: white; border: 2px solid #E0E0E0; border-radius: 10px; padding: 10px;
    }
    .final-card .label { font-size: 16px; font-weight: 700; color: #2E7D32; text-align: center; margin-bottom: 8px; }
    .tone-slot {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 0; border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }
    .tone-slot:last-child { border-bottom: none; }
    .tone-slot .tone-label { width: 40px; color: #999; font-size: 12px; }
    .tone-slot .tone-status { flex: 1; font-size: 11px; color: #ccc; }
    .tone-slot .tone-status.ok { color: #2E7D32; }

    /* 隐藏的 file input */
    .file-input-hidden { display: none; }
  </style>
</head>
<body>

<!-- 登录 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>语音录音管理</h2>
    <input type="password" id="pwdInput" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- 主界面 -->
<div class="app" id="app">
  <div class="topbar">
    <h1>语音录音管理</h1>
    <span class="stats" id="statsText">加载中...</span>
    <a href="voice-test.html">前往测试页</a>
  </div>

  <div class="container">
    <h2>声母 <span class="count" id="initialCount"></span></h2>
    <div class="initial-grid" id="initialGrid"></div>

    <h2>韵母（四声） <span class="count" id="finalCount"></span></h2>
    <div class="final-grid" id="finalGrid"></div>
  </div>
</div>

<input type="file" accept=".mp3,audio/mpeg" class="file-input-hidden" id="fileInput">

<script>
  const INITIALS = ['b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'];
  const FINALS = ['a','o','e','i','u','ü','ai','ei','ui','ao','ou','iu','ie','üe','er','an','en','in','un','ün','ang','eng','ing','ong','ia','iao','ian','iang','iong','ua','uo','uai','uan','uang'];

  let token = localStorage.getItem('admin_token') || '';
  let uploadedFiles = new Set();
  let pendingUpload = null; // { filename }

  // ===== 登录 =====
  async function doLogin() {
    const pwd = document.getElementById('pwdInput').value;
    const errEl = document.getElementById('loginError');
    try {
      const resp = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd, role: 'admin' }),
      });
      const data = await resp.json();
      if (!resp.ok) { errEl.textContent = data.error; return; }
      token = data.token;
      localStorage.setItem('admin_token', token);
      enterApp();
    } catch { errEl.textContent = '网络错误'; }
  }

  function enterApp() {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    loadFiles();
  }

  // 检查已有 token
  if (token) {
    fetch('/api/voice', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => { if (r.ok) enterApp(); })
      .catch(() => {});
  }

  // ===== 加载文件列表 =====
  async function loadFiles() {
    try {
      const resp = await fetch('/api/voice');
      const files = await resp.json();
      uploadedFiles = new Set(files);
    } catch (e) { console.error('加载文件列表失败', e); }
    renderAll();
  }

  function filenameForInitial(py) { return `initial-${py}.mp3`; }
  function filenameForFinal(py, tone) { return `final-${py}-${tone}.mp3`; }

  // ===== 渲染 =====
  function renderAll() {
    renderInitials();
    renderFinals();
    updateStats();
  }

  function renderInitials() {
    const grid = document.getElementById('initialGrid');
    grid.innerHTML = '';
    INITIALS.forEach(py => {
      const fn = filenameForInitial(py);
      const has = uploadedFiles.has(fn);
      const card = document.createElement('div');
      card.className = 'voice-card' + (has ? ' uploaded' : '');
      card.innerHTML = `
        <div class="label">${py}</div>
        <div class="status">${has ? '已上传' : '未上传'}</div>
        <div class="actions">
          <button class="btn-sm btn-play" ${has ? '' : 'disabled'} onclick="playVoice('${fn}')">试听</button>
          <button class="btn-sm btn-upload" onclick="startUpload('${fn}')">上传</button>
          ${has ? `<button class="btn-sm btn-del" onclick="delVoice('${fn}')">删除</button>` : ''}
        </div>`;
      grid.appendChild(card);
    });
  }

  function renderFinals() {
    const grid = document.getElementById('finalGrid');
    grid.innerHTML = '';
    const toneMarks = ['ˉ', 'ˊ', 'ˇ', 'ˋ'];
    FINALS.forEach(py => {
      const card = document.createElement('div');
      card.className = 'final-card';
      let slotsHtml = '';
      for (let t = 1; t <= 4; t++) {
        const fn = filenameForFinal(py, t);
        const has = uploadedFiles.has(fn);
        slotsHtml += `
          <div class="tone-slot">
            <span class="tone-label">${t}声${toneMarks[t-1]}</span>
            <span class="tone-status ${has ? 'ok' : ''}">${has ? '已上传' : '—'}</span>
            <button class="btn-sm btn-play" ${has ? '' : 'disabled'} onclick="playVoice('${fn}')">听</button>
            <button class="btn-sm btn-upload" onclick="startUpload('${fn}')">传</button>
            ${has ? `<button class="btn-sm btn-del" onclick="delVoice('${fn}')">删</button>` : ''}
          </div>`;
      }
      card.innerHTML = `<div class="label">${py}</div>${slotsHtml}`;
      grid.appendChild(card);
    });
  }

  function updateStats() {
    const initialUploaded = INITIALS.filter(py => uploadedFiles.has(filenameForInitial(py))).length;
    let finalTotal = 0, finalUploaded = 0;
    FINALS.forEach(py => {
      for (let t = 1; t <= 4; t++) {
        finalTotal++;
        if (uploadedFiles.has(filenameForFinal(py, t))) finalUploaded++;
      }
    });
    document.getElementById('statsText').textContent =
      `声母 ${initialUploaded}/${INITIALS.length} · 韵母 ${finalUploaded}/${finalTotal}`;
    document.getElementById('initialCount').textContent = `(${initialUploaded}/${INITIALS.length})`;
    document.getElementById('finalCount').textContent = `(${finalUploaded}/${finalTotal})`;
  }

  // ===== 上传 =====
  function startUpload(filename) {
    pendingUpload = filename;
    document.getElementById('fileInput').click();
  }

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || !pendingUpload) return;

    const formData = new FormData();
    formData.append('file', file);

    try {
      const resp = await fetch(`/api/voice/${pendingUpload}`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: formData,
      });
      if (!resp.ok) {
        let msg = '未知错误';
        try { const err = await resp.json(); msg = err.error || msg; } catch {}
        alert('上传失败: ' + msg);
        return;
      }
      uploadedFiles.add(pendingUpload);
      renderAll();
    } catch { alert('上传网络错误'); }
    e.target.value = '';
    pendingUpload = null;
  });

  // ===== 播放 =====
  let currentAudio = null;
  function playVoice(filename) {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    currentAudio = new Audio(`/voice/${filename}`);
    currentAudio.play().catch(() => alert('播放失败'));
  }

  // ===== 删除 =====
  async function delVoice(filename) {
    if (!confirm(`确定删除 ${filename}？`)) return;
    try {
      const resp = await fetch(`/api/voice/${filename}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });
      if (resp.ok) {
        uploadedFiles.delete(filename);
        renderAll();
      }
    } catch { alert('删除失败'); }
  }
</script>
</body>
</html>
